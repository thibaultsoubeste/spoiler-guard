name: Release & Sign

on:
  push:
    branches:
      - master
    paths:
      - manifest.json

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          NEW=$(grep '"version"' manifest.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          OLD=$(git show HEAD~1:manifest.json 2>/dev/null | grep '"version"' | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/' || echo "")
          echo "NEW=$NEW OLD=$OLD"
          if [ "$NEW" = "$OLD" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "VERSION=$NEW" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: 20

      - name: Install web-ext
        if: steps.check.outputs.changed == 'true'
        run: npm install -g web-ext

      - name: Sign extension on AMO
        if: steps.check.outputs.changed == 'true'
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir ./artifacts \
            --channel unlisted \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET"
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}

      - name: Find signed xpi
        if: steps.check.outputs.changed == 'true'
        id: xpi
        run: |
          XPI=$(ls artifacts/*.xpi)
          XPI_NAME=$(basename "$XPI")
          echo "XPI_PATH=$XPI" >> "$GITHUB_OUTPUT"
          echo "XPI_NAME=$XPI_NAME" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        if: steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.VERSION }}
          files: ${{ steps.xpi.outputs.XPI_PATH }}
          body: "Spoiler Guard v${{ steps.check.outputs.VERSION }}"

      - name: Update updates.json on gh-pages
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.VERSION }}"
          XPI_NAME="${{ steps.xpi.outputs.XPI_NAME }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cat > updates.json << EOF
          {
            "addons": {
              "spoiler-guard@thibaultsoubeste": {
                "updates": [
                  {
                    "version": "$VERSION",
                    "update_link": "https://github.com/thibaultsoubeste/spoiler-guard/releases/download/v$VERSION/$XPI_NAME"
                  }
                ]
              }
            }
          }
          EOF
          git add updates.json
          git commit -m "Update to v$VERSION"
          git push origin gh-pages
